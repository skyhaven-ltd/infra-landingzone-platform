name: "Terraform"

on:
  push:
    branches:
      - "major/**"
      - "minor/**"
      - "patch/**"
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        default: prd
        options:
          - prd
      terraform_action:
        description: "Terraform Action"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

jobs:
  Terraform:
    name: "Terraform ${{ inputs.terraform_action || 'plan' }} (${{ inputs.env || 'prd' }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'prd' }}
    env:
      ARM_CLIENT_ID: ${{ secrets.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ secrets.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ secrets.AZURE_TENANT_ID }}
      ARM_USE_OIDC: "true"
      TF_ENV: ${{ inputs.env || 'prd' }}
      TF_VAR_cloudflare_api_token: ${{ secrets.CLOUDFLARE_API_TOKEN }}
      TF_VAR_cloudflare_account_id: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
      TF_VAR_porkbun_api_key: ${{ secrets.PORKBUN_API_KEY }}
      TF_VAR_porkbun_secret_api_key: ${{ secrets.PORKBUN_SECRET_API_KEY }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0 # v7.0.0
        with:
          persist-credentials: false

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e # v4.0.1
        with:
          terraform_version: "1.14.8"

      - name: "Azure Login"
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43 # v3.0.0
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Ensure State Container"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/ensure-tfstate-container@35c3928dd1e653238dc0de99c8658c916c703a1b # v1.0.1
        with:
          storage_account_name: sttfsplatform${{ inputs.env || 'prd' }}uks01
          container_name: ${{ github.event.repository.name }}
          login: "false"

      - name: "Terraform Init"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/terraform-backend-init@35c3928dd1e653238dc0de99c8658c916c703a1b # v1.0.1
        with:
          environment: ${{ inputs.env || 'prd' }}
          working_directory: infra
          platform_subscription_id: ${{ secrets.AZURE_PLATFORM_SUBSCRIPTION_ID }}
          container_name: ${{ github.event.repository.name }}

      - name: "Terraform Plan"
        if: inputs.terraform_action == 'plan' || inputs.terraform_action == ''
        run: |
          terraform -chdir=infra plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Apply"
        if: inputs.terraform_action == 'apply'
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Destroy"
        if: inputs.terraform_action == 'destroy'
        run: |
          terraform -chdir=infra destroy -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Break State Lease"
        if: always()
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/break-tfstate-lease@35c3928dd1e653238dc0de99c8658c916c703a1b # v1.0.1
        with:
          storage_account_name: sttfsplatform${{ inputs.env || 'prd' }}uks01
          container_name: ${{ github.event.repository.name }}
          login: "false"
