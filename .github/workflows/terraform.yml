name: "Terraform"

on:
  push:
    branches:
      - main
      - "major/**"
      - "minor/**"
      - "patch/**"
    paths:
      - "infra/**"
  workflow_dispatch:
    inputs:
      env:
        description: "Environment"
        type: choice
        default: prd
        options:
          - prd
      terraform_action:
        description: "Terraform Action"
        type: choice
        default: plan
        options:
          - plan
          - apply
          - destroy

permissions:
  contents: read
  id-token: write

concurrency:
  group: terraform-${{ github.repository }}
  cancel-in-progress: false

jobs:
  Terraform:
    name: "Terraform ${{ inputs.terraform_action || (github.ref == 'refs/heads/main' && 'apply' || 'plan') }} (${{ inputs.env || 'prd' }})"
    runs-on: ubuntu-latest
    environment: ${{ inputs.env || 'prd' }}
    env:
      ARM_CLIENT_ID: ${{ vars.AZURE_CLIENT_ID }}
      ARM_SUBSCRIPTION_ID: ${{ vars.AZURE_SUBSCRIPTION_ID }}
      ARM_TENANT_ID: ${{ vars.AZURE_TENANT_ID }}
      ARM_USE_OIDC: "true"
      TF_ACTION: ${{ inputs.terraform_action || (github.ref == 'refs/heads/main' && 'apply' || 'plan') }}
      TF_ENV: ${{ inputs.env || 'prd' }}
    steps:
      - name: "Checkout"
        uses: actions/checkout@9c091bb21b7c1c1d1991bb908d89e4e9dddfe3e0
        with:
          persist-credentials: false

      - name: "Setup Terraform"
        uses: hashicorp/setup-terraform@dfe3c3f87815947d99a8997f908cb6525fc44e9e
        with:
          terraform_version: "1.14.8"

      - name: "Azure Login"
        uses: azure/login@532459ea530d8321f2fb9bb10d1e0bcf23869a43
        with:
          client-id: ${{ vars.AZURE_CLIENT_ID }}
          tenant-id: ${{ vars.AZURE_TENANT_ID }}
          subscription-id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}

      - name: "Fetch Secrets From Key Vault"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/keyvault-secrets@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          keyvault_name: kv-platform-${{ env.TF_ENV }}-uks-02
          secrets: |
            TF_VAR_cloudflare_api_token=cloudflare-api-token
            TF_VAR_cloudflare_account_id=cloudflare-account-id
            TF_VAR_porkbun_api_key=porkbun-api-key
            TF_VAR_porkbun_secret_api_key=porkbun-secret-api-key
          login: "false"

      - name: "Ensure State Container"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/ensure-tfstate-container@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          storage_account_name: stplatform${{ env.TF_ENV }}uks02
          container_name: ${{ github.event.repository.name }}
          login: "false"

      - name: "Terraform Init"
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/terraform-backend-init@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          environment: ${{ env.TF_ENV }}
          working_directory: infra
          platform_subscription_id: ${{ vars.AZURE_PLATFORM_SUBSCRIPTION_ID }}
          container_name: ${{ github.event.repository.name }}

      - name: "Terraform Plan"
        if: env.TF_ACTION == 'plan'
        run: |
          terraform -chdir=infra plan \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Apply"
        if: env.TF_ACTION == 'apply'
        run: |
          terraform -chdir=infra apply -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Terraform Destroy"
        if: env.TF_ACTION == 'destroy'
        run: |
          terraform -chdir=infra destroy -auto-approve \
            -var-file="vars/globals.tfvars" \
            -var-file="vars/${TF_ENV}.tfvars"

      - name: "Break State Lease"
        if: always()
        uses: skyhaven-ltd/pipeline-engineering-github-actions/actions/break-tfstate-lease@6cfa143b42ff464e4101d69c09945db9fac369e5
        with:
          storage_account_name: stplatform${{ env.TF_ENV }}uks02
          container_name: ${{ github.event.repository.name }}
          login: "false"
